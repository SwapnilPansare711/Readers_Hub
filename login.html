<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ReaderHub Login</title>

  <!-- Bootstrap 5.3 CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <style>

    body{
      background: linear-gradient(135deg,#f8f5f2,#f3e2df);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    /* Login Card */

    .login-card{
      width: 100%;
      max-width: 420px;

      background: white;

      border-radius: 25px;

      padding: 40px;

      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    /* Logo */

    .logo-text{
      font-size: 38px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 10px;

      background: linear-gradient(135deg,#2b2b2b,#c97b73);

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Title */

    .login-title{
      text-align: center;
      color: #666;
      margin-bottom: 30px;
    }

    /* Input */

    .form-control{
      height: 50px;
      border-radius: 12px;
      padding-left: 45px;
      border: 1px solid #ddd;
    }

    .form-control:focus{
      box-shadow: none;
      border-color: #c97b73;
    }

    /* Input Icon */

    .input-box{
      position: relative;
    }

    .input-box i{
      position: absolute;
      top: 50%;
      left: 15px;
      transform: translateY(-50%);
      color: #999;
    }

    /* Forgot Password */

    .forgot-link{
      text-decoration: none;
      color: #c97b73;
      font-size: 14px;
    }

    /* Login Button */

    .login-btn{
      background: linear-gradient(135deg,#c97b73,#b8645d);
      border: none;
      height: 50px;
      border-radius: 12px;
      color: white;
      font-size: 18px;
      font-weight: 600;
      transition: 0.3s;
    }

    .login-btn:hover{
      transform: translateY(-2px);
      color: white;
    }

    /* Register */

    .register-text a{
      color: #c97b73;
      text-decoration: none;
      font-weight: 600;
    }

    /* Back */

    .back-home{
      text-decoration: none;
      color: #555;
      transition: 0.3s;
    }

    .back-home:hover{
      color: #c97b73;
    }

    
  </style>

</head>

<body>

  <!-- Login Card -->

  <div class="login-card">

    <!-- Logo -->

    <h1 class="logo-text">
      ReaderHub
    </h1>

    <p class="login-title">
      Welcome Back Reader!
    </p>

    <!-- Form -->

    <form>

      <!-- Email -->

      <div class="mb-4 input-box">

        <i class="bi bi-envelope-fill"></i>

        <input
          type="email"
          class="form-control"
          placeholder="Enter your email"
          required
        >

      </div>

      <!-- Password -->

      <div class="mb-3 input-box">

        <i class="bi bi-lock-fill"></i>

        <input
          type="password"
          class="form-control"
          placeholder="Enter your password"
          required
        >

      </div>

      <!-- Forgot -->

      <div class="text-end mb-4">

        <a href="#" class="forgot-link">
          Forgot Password?
        </a>

      </div>

      <!-- Button -->

      <button
        type="submit"
        class="btn login-btn w-100"
      >
        Login
      </button>

    </form>

    <!-- Register -->

    <p class="text-center mt-4 register-text">

      Don't have an account?

      <a href="#">
        Register
      </a>

    </p>

    <!-- Back -->

    <div class="text-center mt-3">

      <a href="index.html" class="back-home">

        <i class="bi bi-arrow-left"></i>

        Back to Home

      </a>

    </div>

  </div>

  <!-- Bootstrap JS -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
